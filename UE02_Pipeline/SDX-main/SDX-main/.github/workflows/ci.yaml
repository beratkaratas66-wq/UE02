name: CI/CD Pipeline - Go Recipe API

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Hardening: Least-Privilege auf Workflow-Ebene (Teil B.3)
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/recipe-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Code & Dockerfile
    runs-on: ubuntu-24.04 # Hardening: Pinned Runner (Teil B.3)
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1 (SHA gepinnt)

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.24' # Exakt auf dein Dockerfile abgestimmt

      - name: Lint Go Code
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5 # Gibt dem Linter eine stabile Go-Version vor
          working-directory: src/
          skip-cache: true
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Start Database and API
        # Startet deine docker-compose.yaml aus Übung 1
        run: docker compose up -d

      - name: Wait for API to be ready
        run: |
          echo "Warte auf Datenbank und API..."
          sleep 15
          docker compose ps

      - name: Run API Tests
        # Testet, ob der Container erreichbar ist (Passe den Pfad ggf. an deine Go-App an)
        run: |
          curl --fail http://localhost:8080/ || exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v

  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-24.04
    needs: integration-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # (Bleibt gepinnt)

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # (Bleibt gepinnt)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # (Bleibt gepinnt)

      - name: Build local image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # <--- Hier ist die ERSTE v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:test-scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (Tags with Commit SHA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long

      - name: Build and push multi-arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6 # <--- Hier fehlte die ZWEITE v6!
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true